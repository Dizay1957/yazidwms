spring:
  application:
    name: YazidWMS
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:yazidwms}
    username: ${DB_USERNAME:yazid}
    password: ${DB_PASSWORD:yazid_secret}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
  cache:
    type: simple

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:true}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:true}
    path: /swagger-ui.html

app:
  security:
    jwt-secret: ${JWT_SECRET:YazidWMS-Local-Development-Secret-Key-Change-Me-Immediately-2026}
    access-token-minutes: ${JWT_ACCESS_MINUTES:30}
    refresh-token-days: ${JWT_REFRESH_DAYS:7}
  rate-limit:
    requests-per-minute: ${RATE_LIMIT_PER_MINUTE:120}
  seed:
    admin-email: ${SEED_ADMIN_EMAIL:admin@yazidwms.local}
    admin-password: ${SEED_ADMIN_PASSWORD:Admin@12345}
    demo-data: ${SEED_DEMO_DATA:false}
  notification:
    admin-email: ${NOTIFICATION_ADMIN_EMAIL:${SEED_ADMIN_EMAIL:admin@yazidwms.local}}

logging:
  level:
    com.yazidwms: INFO
